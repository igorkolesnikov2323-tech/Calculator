<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/2026/myfirstproject/myfirstproject/css/reset.css">
    <title>Calculator</title>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="history"></div>
            <input id="value" type="text" value="">
            <div class="grid">
                <button class="grid__item item1">1</button>
                <button class="grid__item item2">2</button>
                <button class="grid__item item3">3</button>
                <button class="grid__item item4">4</button>
                <button class="grid__item item5">5</button>
                <button class="grid__item item6">6</button>
                <button class="grid__item item7">7</button>
                <button class="grid__item item8">8</button>
                <button class="grid__item item9">9</button>
                <button class="grid__item item0">0</button>
                <button class="grid__item item10">.</button>
                <button class="grid__item item11">=</button>
                <button class="grid__item item12">-</button>
                <button class="grid__item item13">+</button>
                <button class="grid__item item14">/</button>
                <button class="grid__item item15">*</button>
                <button class="grid__item item16">AC</button>
                <button class="grid__item item17">+/-</button>
                <button class="grid__item item18">%</button>
                <button class="grid__item item19"><</button>
            </div>
        </div>
    </div>
    <script src="/2026/calculator/logic.js"></script>
    <script src="/2026/calculator/three.min.js"></script>
    <script src="/2026/calculator/vanta.net.min.js"></script>
    <script src="/2026/calculator/app.js"></script>
</body>
</html>
